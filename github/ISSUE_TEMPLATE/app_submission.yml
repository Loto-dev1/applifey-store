name: "🌐 Submit a New App"
description: "Propose a new PWA web app to be added to the global Applifey store."
title: "[App-Submission]: "
labels: ["app-proposal"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for wanting to improve the Applifey Store! Please fill out the form below.
  - type: input
    id: app_name
    attributes:
      label: "Name der App"
      placeholder: "e.g., YouTube, Discord, Notion..."
    validations:
      required: true
  - type: input
    id: app_url
    attributes:
      label: "Web-Adresse (URL)"
      placeholder: "https://www.example.com"
    validations:
      required: true
