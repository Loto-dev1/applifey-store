name: "🌐 Submit a New App"
description: "Propose a new PWA web app to be added to the global Applifey store."
title: "[App-Submission]: "
labels: ["app-proposal"]
body:
  - type: input
    id: app_name
    attributes:
      label: "Name der App"
      placeholder: "e.g., YouTube"
    validations:
      required: true
  - type: input
    id: app_url
    attributes:
      label: "Web-Adresse (URL)"
      placeholder: "https://www.youtube.com"
    validations:
      required: true
