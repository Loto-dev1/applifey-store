name: Auto Accept App
on:
  issue_comment:
    types: [created]

jobs:
  add_app:
   
    if: |
      contains(github.event.comment.body, '/accept') && 
      (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Parse Form Data
        id: parse
        run: |
          BODY="${{ github.event.issue.body }}"
          # Greift den Namen und die URL sicher ab
          NAME=$(echo "$BODY" | grep -A 1 "### Name der App" | tail -n 1 | xargs)
          URL=$(echo "$BODY" | grep -A 1 "### Web-Adresse (URL)" | tail -n 1 | xargs)
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Update JSON
        run: |
          jq --arg name "${{ steps.parse.outputs.name }}" --arg url "${{ steps.parse.outputs.url }}" \
          '. += [{"name": $name, "url": $url}]' apps.json > tmp.json && mv tmp.json apps.json

      - name: Commit & Push
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add apps.json
          git commit -m "Add ${{ steps.parse.outputs.name }}"
          git push

      - name: Success Comment
        uses: peter-evans/create-or-update-comment@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          body: "🚀 App '${{ steps.parse.outputs.name }}' successfully added by a verified admin!"
